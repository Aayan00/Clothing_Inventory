{% extends "base.html" %}
{% block content %}
<h2><i class="fas fa-chart-pie me-2"></i>Sales Dashboard</h2>

<div class="row my-4">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0">Units Sold per Item</h5>
            </div>
            <div class="card-body">
                <canvas id="salesChart" width="400" height="200"></canvas>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card shadow-sm mb-3">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0"><i class="fas fa-fire"></i> Best Sellers</h5>
            </div>
            <ul class="list-group list-group-flush" id="bestSellersList">
                <li class="list-group-item text-center">Loading...</li>
            </ul>
        </div>
        <div class="card shadow-sm">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="fas fa-snowflake"></i> Slow Movers</h5>
            </div>
            <ul class="list-group list-group-flush" id="worstSellersList">
                <li class="list-group-item text-center">Loading...</li>
            </ul>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
let chartInstance = null;

async function loadDashboard() {
    try {
        const response = await fetch('/api/dashboard_data');
        const data = await response.json();

        // Update chart
        const ctx = document.getElementById('salesChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.labels,
                datasets: [{
                    label: 'Units Sold',
                    data: data.quantities,
                    backgroundColor: 'rgba(54, 162, 235, 0.7)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: { y: { beginAtZero: true } }
            }
        });

        // Update best sellers list
        const bestList = document.getElementById('bestSellersList');
        if (data.best_sellers.length > 0) {
            bestList.innerHTML = data.best_sellers.map(item => `
                <li class="list-group-item d-flex justify-content-between">
                    <span>${item.name} <small class="text-muted">(${item.category})</small></span>
                    <span class="badge bg-success">${item.total_sold} sold</span>
                </li>
            `).join('');
        } else {
            bestList.innerHTML = '<li class="list-group-item text-center">No sales yet.</li>';
        }

        // Update worst sellers list
        const worstList = document.getElementById('worstSellersList');
        if (data.worst_sellers.length > 0) {
            worstList.innerHTML = data.worst_sellers.map(item => `
                <li class="list-group-item d-flex justify-content-between">
                    <span>${item.name} <small class="text-muted">(${item.category})</small></span>
                    <span class="badge bg-secondary">${item.total_sold} sold</span>
                </li>
            `).join('');
        } else {
            worstList.innerHTML = '<li class="list-group-item text-center">No data.</li>';
        }
    } catch (error) {
        console.error('Error loading dashboard:', error);
    }
}

document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
{% endblock %}
